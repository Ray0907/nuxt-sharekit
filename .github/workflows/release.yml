name: Release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Verify release candidate
        run: pnpm verify:replacement

      - name: Pack release artifacts
        run: |
          mkdir -p .release
          pnpm --filter @nuxt-sharekit/core pack --pack-destination "$GITHUB_WORKSPACE/.release"
          pnpm --filter nuxt-sharekit pack --pack-destination "$GITHUB_WORKSPACE/.release"

      - name: Publish core
        run: >-
          pnpm --package=npm@12.0.1 dlx npm publish
          .release/nuxt-sharekit-core-*.tgz --access public

      - name: Publish Nuxt module
        run: >-
          pnpm --package=npm@12.0.1 dlx npm publish
          .release/nuxt-sharekit-[0-9]*.tgz --access public
