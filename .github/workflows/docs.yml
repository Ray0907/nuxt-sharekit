name: Deploy docs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate docs
        run: pnpm --filter nuxt-sharekit-docs generate
        env:
          NUXT_APP_BASE_URL: /nuxt-sharekit/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-app/.output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
